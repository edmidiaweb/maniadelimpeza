<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Finalizar Pedido | Mania de Limpeza</title>
</head>
<body class="bg-gray-50 p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-lg border border-indigo-50">
        
        <a href="index.html" class="inline-flex items-center text-indigo-600 font-bold mb-6 hover:text-indigo-800">
            <i class="fas fa-arrow-left mr-2"></i> Voltar ao Catálogo
        </a>

        <h2 class="text-lg font-bold mb-3 text-indigo-900">Seu Pedido</h2>
        <div id="listaItens" class="space-y-2 mb-6 border-b border-indigo-50 pb-4 text-sm text-gray-600"></div>

        <div class="space-y-3 mb-6">
            <input type="text" id="rua" placeholder="Rua" class="w-full p-2 border rounded">
            <input type="text" id="numero" placeholder="Número" class="w-full p-2 border rounded">
            <input type="text" id="bairro" placeholder="Bairro" class="w-full p-2 border rounded">
            <input type="text" id="referencia" placeholder="Ponto de Referência" class="w-full p-2 border rounded">
            
            <select id="pagamento" onchange="verificarPag()" class="w-full p-2 border rounded">
                <option value="Pix">Pix</option>
                <option value="Dinheiro">Dinheiro</option>
                <option value="Cartão">Cartão</option>
            </select>
            <input type="text" id="troco" placeholder="Troco para quanto?" class="hidden w-full p-2 border rounded">
        </div>

        <button onclick="confirmar()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl hover:bg-green-700">
            Enviar Pedido via WhatsApp
        </button>
    </div>

    <script>
        // Carrega o carrinho do localStorage
        const carrinho = JSON.parse(localStorage.getItem('meuCarrinho') || '[]');
        const listaItens = document.getElementById('listaItens');

        // Renderiza itens
        listaItens.innerHTML = carrinho.map(i => `
            <div class="flex justify-between">
                <span>${i.qtd}x ${i.n}</span>
                <span>R$ ${(i.v * i.qtd).toFixed(2)}</span>
            </div>
        `).join('');

        function verificarPag() { 
            document.getElementById('troco').classList.toggle('hidden', document.getElementById('pagamento').value !== 'Dinheiro'); 
        }

        function confirmar() {
            const rua = document.getElementById('rua').value;
            const num = document.getElementById('numero').value;
            const bairro = document.getElementById('bairro').value;
            const ref = document.getElementById('referencia').value;
            const pag = document.getElementById('pagamento').value;
            const troco = document.getElementById('troco').value;
            
            if(!rua || !num || !bairro) return alert("Por favor, preencha Rua, Número e Bairro!");
            
            // Formata mensagem para WhatsApp
            let msg = `🛍️ *Novo Pedido - Mania de Limpeza*%0A%0A` +
                      `*Itens:*` + carrinho.map(i => `%0A- ${i.qtd}x ${i.n} (R$ ${i.v.toFixed(2)})`).join("") + `%0A%0A` +
                      `📍 *Endereço:* ${rua}, ${num}%0A` +
                      `🚩 *Ref:* ${ref}%0A` +
                      `🏘️ *Bairro:* ${bairro}%0A%0A` +
                      `💳 *Pagamento:* ${pag}${pag === 'Dinheiro' && troco ? ' (Troco para R$ ' + troco + ')' : ''}`;

            window.open(`https://wa.me/55SEUNUMERO?text=${msg}`, '_blank'); // Substitua pelo seu número
        }
    </script>
</body>
</html>
