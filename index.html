<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mania de Limpeza | Catálogo Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen pb-28 sm:pb-24">

<header class="bg-indigo-900 text-white sticky top-0 z-50 shadow-md px-4 py-3">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
                <i class="fas fa-pump-soap text-indigo-400"></i> Mania de Limpeza
            </h1>
            <p class="text-xs text-indigo-200">Faça seu pedido e receba em casa</p>
        </div>
        <a href="carrinho.html" class="relative bg-indigo-700 hover:bg-indigo-600 transition px-4 py-2 rounded-xl flex items-center gap-2 border border-indigo-500">
            <i class="fas fa-shopping-cart"></i>
            <span class="font-semibold text-sm">Ver Carrinho</span>
            <span id="badgeCarrinho" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
        </a>
    </div>
</header>

<div class="category-menu-fixed px-4 py-3 shadow-sm">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center gap-2 justify-between">
            <div class="flex items-center gap-2 flex-1 min-w-0">
                <button onclick="toggleMenuCategorias()" id="btnCategoriasDropdown" class="whitespace-nowrap px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold shadow-sm hover:bg-indigo-700 transition flex items-center gap-2">
                    <i class="fas fa-bars"></i> <span id="txtCategoriaAtiva">Todos</span> <i class="fas fa-chevron-down text-[10px]"></i>
                </button>
                
                <button onclick="toggleFiltroPreco()" id="btnFiltroPreco" class="whitespace-nowrap px-4 py-2 bg-white border border-gray-200 text-gray-700 rounded-xl text-xs font-bold shadow-sm hover:bg-gray-50 transition flex items-center gap-1.5">
                    <i class="fas fa-tags text-[10px] text-gray-400"></i> Até R$ 10
                </button>
            </div>
            
            <div class="hidden sm:block w-full max-w-xs flex-shrink-0">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-indigo-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input
                        type="text"
                        id="searchBarDesktop"
                        data-search-input
                        placeholder="Buscar produto..."
                        class="w-full pl-10 pr-10 py-2.5 bg-white border border-indigo-100 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm text-gray-700 transition placeholder-gray-400"
                    />
                    <button id="clearSearchDesktop" data-clear-search data-target-input="searchBarDesktop" aria-label="Limpar campo de pesquisa" title="Limpar pesquisa" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 hidden">
                        <i class="fas fa-times-circle"></i>
                    </button>
                </div>
            </div>
            
            <div class="sm:hidden flex-shrink-0">
                <button id="mobileSearchToggle" aria-label="Abrir busca" title="Buscar produto" class="w-11 h-11 rounded-full bg-white border border-indigo-100 text-indigo-900 shadow-sm flex items-center justify-center hover:bg-indigo-50 transition">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
        
        <div id="mobileSearchContainer" class="sm:hidden hidden mt-3">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-indigo-400">
                    <i class="fas fa-search"></i>
                </span>
                <input
                    type="text"
                    id="searchBarMobile"
                    data-search-input
                    placeholder="Buscar produto..."
                    class="w-full pl-10 pr-10 py-3 bg-white border border-indigo-100 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-gray-700 transition placeholder-gray-400"
                />
                <button id="clearSearchMobile" data-clear-search data-target-input="searchBarMobile" aria-label="Limpar campo de pesquisa" title="Limpar pesquisa" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 hidden">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="modalCategorias" class="fixed inset-0 z-50 hidden transition-opacity duration-200 opacity-0 flex items-start justify-center pt-36 px-4">
    <div onclick="fecharMenuCategorias()" class="fixed inset-0 bg-black/30 backdrop-blur-xs"></div>
    <div id="painelCategorias" class="bg-white rounded-2xl shadow-xl border border-gray-100 w-full max-w-sm flex flex-col max-h-[60vh] z-10 transform scale-95 transition-transform duration-200">
        <div class="p-3 border-b border-gray-100">
            <div class="flex justify-between items-center mb-2">
                <span class="font-bold text-gray-900 text-sm">Categorias</span>
                <button onclick="fecharMenuCategorias()" class="text-gray-400 hover:text-gray-600 text-sm p-1"><i class="fas fa-times"></i></button>
            </div>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-2.5 text-gray-400">
                    <i class="fas fa-search text-xs"></i>
                </span>
                <input type="text" id="buscaCategoriaInput" oninput="filtrarListaCategorias()" placeholder="Pesquisar categoria..." class="w-full pl-8 pr-3 py-1.5 bg-gray-50 border border-gray-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-700" />
            </div>
        </div>
        <div id="listaCategoriasContainer" class="overflow-y-auto p-1.5 space-y-0.5 max-h-[40vh] no-scrollbar"></div>
    </div>
</div>

<main class="max-w-4xl mx-auto p-4">
    <div id="gridProdutos" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
        <div class="col-span-full text-center py-12 text-gray-400">
            <i class="fas fa-spinner fa-spin text-3xl text-indigo-600 mb-2"></i>
            <p>Carregando catálogo de produtos...</p>
        </div>
    </div>
</main>

<div id="barraFixaMobile" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-[0_-4px_12px_rgba(0,0,0,0.08)] p-4 z-40 flex justify-between items-center md:hidden hidden">
    <div class="text-sm">
        <p class="text-gray-500 text-xs font-medium">Itens selecionados: <span id="qtdItensMobile" class="font-bold text-indigo-900">0</span></p>
        <p class="font-black text-indigo-950 text-xl" id="totalFixInferior">R$ 0,00</p>
    </div>
    <a href="carrinho.html" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-5 py-2.5 rounded-xl flex items-center gap-2 transition text-sm shadow-sm">
        Ver Carrinho <i class="fas fa-arrow-right text-xs"></i>
    </a>
</div>

</body>
</html>
