<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mania de Limpeza | Catálogo Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <style>
        .btn-adicionar-flash {
            animation: flash-green 0.7s ease;
        }
        @keyframes flash-green {
            0%   { background-color: #4f46e5; }
            30%  { background-color: #16a34a; }
            100% { background-color: #4f46e5; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen pb-28 sm:pb-24">

<header class="bg-indigo-900 text-white sticky top-0 z-50 shadow-md px-4 py-3">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
                <i class="fas fa-pump-soap text-indigo-400"></i> Mania de Limpeza
            </h1>
            <p class="text-xs text-indigo-200">Faça seu pedido e receba em casa</p>
        </div>
        <a href="carrinho.html" class="relative hidden md:flex bg-indigo-700 hover:bg-indigo-600 transition px-4 py-2 rounded-xl items-center gap-2 border border-indigo-500">
            <i class="fas fa-shopping-cart"></i>
            <span class="font-semibold text-sm">Ver Carrinho</span>
            <span id="badgeCarrinho" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
        </a>
        <a href="carrinho.html" class="relative md:hidden p-2">
            <i class="fas fa-shopping-cart text-white text-lg"></i>
            <span id="badgeCarrinhoMobileHeader" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden">0</span>
        </a>
    </div>
</header>

<div class="category-menu-fixed px-4 py-3 shadow-sm">
    <div class="max-w-4xl mx-auto space-y-2">

        <div class="flex items-center gap-2 justify-end">
            <div class="hidden sm:block w-full max-w-xs flex-shrink-0">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-indigo-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="searchBarDesktop" data-search-input autocomplete="off"
                        placeholder="Buscar produto..."
                        class="w-full pl-10 pr-10 py-2.5 bg-white border border-indigo-100 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-sm text-gray-700 transition placeholder-gray-400"/>
                    <button id="clearSearchDesktop" data-clear-search data-target-input="searchBarDesktop"
                        aria-label="Limpar pesquisa"
                        class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 hidden">
                        <i class="fas fa-times-circle"></i>
                    </button>
                </div>
            </div>

            <div class="sm:hidden flex-shrink-0">
                <button id="mobileSearchToggle" aria-label="Abrir busca"
                    class="w-11 h-11 rounded-full bg-white border border-indigo-100 text-indigo-900 shadow-sm flex items-center justify-center hover:bg-indigo-50 transition">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <div class="flex items-center gap-1.5">
            <span class="text-[10px] text-gray-400 font-semibold uppercase tracking-wide mr-1">Ordenar:</span>
            <button id="ord-az" onclick="definirOrdenacao('az')"
                class="px-3 py-1.5 rounded-xl text-xs font-bold bg-indigo-600 text-white transition">
                A–Z
            </button>
            <button id="ord-menor" onclick="definirOrdenacao('menor')"
                class="px-3 py-1.5 rounded-xl text-xs font-bold bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition">
                Menor preço
            </button>
            <button id="ord-maior" onclick="definirOrdenacao('maior')"
                class="px-3 py-1.5 rounded-xl text-xs font-bold bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition">
                Maior preço
            </button>
        </div>

        <div id="mobileSearchContainer" class="sm:hidden hidden">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-indigo-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" id="searchBarMobile" data-search-input autocomplete="off"
                    placeholder="Buscar produto..."
                    class="w-full pl-10 pr-10 py-3 bg-white border border-indigo-100 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent text-gray-700 transition placeholder-gray-400"/>
                <button id="clearSearchMobile" data-clear-search data-target-input="searchBarMobile"
                    aria-label="Limpar pesquisa"
                    class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 hidden">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>
        </div>

    </div>
</div>

<main class="max-w-4xl mx-auto p-4">
    <div id="gridProdutos" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
        <div class="col-span-full text-center py-12 text-gray-400">
            <i class="fas fa-spinner fa-spin text-3xl text-indigo-600 mb-2"></i>
            <p>Carregando catálogo de produtos...</p>
        </div>
    </div>
</main>

<div id="barraFixaMobile" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-[0_-4px_12px_rgba(0,0,0,0.08)] p-4 z-40 flex justify-between items-center md:hidden hidden">
    <div class="text-sm">
        <p class="text-gray-500 text-xs font-medium">Itens selecionados: <span id="qtdItensMobile" class="font-bold text-indigo-900">0</span></p>
        <p class="font-black text-indigo-950 text-xl" id="totalFixInferior">R$ 0,00</p>
    </div>
    <a href="carrinho.html" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-5 py-2.5 rounded-xl flex items-center gap-2 transition text-sm shadow-sm">
        Ver Carrinho <i class="fas fa-arrow-right text-xs"></i>
    </a>
</div>

<div id="lightbox"
     class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 backdrop-blur-sm p-4"
     onclick="fecharLightbox()">
    <button class="absolute top-4 right-4 text-white/70 hover:text-white text-2xl leading-none z-10"
            onclick="fecharLightbox()">
        <i class="fas fa-times"></i>
    </button>
    <div class="relative max-w-sm w-full" onclick="event.stopPropagation()">
        <img id="lightboxImg" src="" alt=""
             class="w-full rounded-2xl shadow-2xl object-contain max-h-[80vh]"
             onclick="fecharLightbox()">
        <p id="lightboxNome" class="text-white text-center text-sm font-bold mt-3 uppercase tracking-wide"></p>
    </div>
</div>

<script>
(function syncBadgeMobileHeader() {
    const orig = window.atualizarInterfaceCarrinho;
    document.addEventListener('DOMContentLoaded', () => {
        const observer = new MutationObserver(() => {
            const badgePrincipal = document.getElementById('badgeCarrinho');
            const badgeMobile    = document.getElementById('badgeCarrinhoMobileHeader');
            if (!badgePrincipal || !badgeMobile) return;
            badgeMobile.textContent = badgePrincipal.textContent;
            badgeMobile.classList.toggle('hidden', badgePrincipal.classList.contains('hidden'));
        });
        const badge = document.getElementById('badgeCarrinho');
        if (badge) observer.observe(badge, { attributes: true, childList: true, subtree: true, characterData: true });
    });
})();
</script>

</body>
</html>
